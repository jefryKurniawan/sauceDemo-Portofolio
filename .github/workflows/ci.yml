name: 🧪 SDET Portfolio CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-ui:
    name: UI Test (Playwright + Firefox)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22.22.1
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.1"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install firefox --with-deps

      - name: Run Playwright tests
        run: npx playwright test --project=firefox --reporter=html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  test-perf:
    name: Performance Test (K6)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22.22.1
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.1"

      - name: Install K6
        run: |
          echo "Installing K6 v0.52.0..."
          curl -L https://github.com/grafana/k6/releases/download/v0.52.0/k6-v0.52.0-linux-amd64.tar.gz -o k6.tar.gz
          tar -xzf k6.tar.gz
          chmod +x k6-v0.52.0-linux-amd64/k6
          sudo mv k6-v0.52.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - name: Run K6 test
        run: |
          echo "Running performance test: performance/load-test.js"
          k6 run performance/load-test.js
